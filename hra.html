<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hra</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">

</head>
<body>
<header>
    <h1>Kámen, nůžky, papír</h1>

    <nav>
        <ul>
            <li><a href="index.html">Domů</a></li>
            <li><a href="hra.html">Hrát</a></li>
            <li><a href="pravidla.html">Pravidla</a></li>
        </ul>
    </nav>
</header>
<main>

    <section class="card center">

        <h2>Vyber svůj tah</h2>

        <div class="buttons">
            <button onclick="playGame('kámen')">🪨 Kámen</button>
            <button onclick="playGame('nůžky')">✂️ Nůžky</button>
            <button onclick="playGame('papír')">📄 Papír</button>
        </div>

        <div class="result">
            <p id="playerChoice"><strong>Ty:</strong> -</p>
            <p id="computerChoice"><strong>Počítač:</strong> -</p>
            <p id="resultText"><strong>Výsledek:</strong> Začni hru</p>
        </div>

        <div class="score">
            <h3>Skóre</h3>
            <p>Hráč: <span id="playerScore">0</span></p>
            <p>Počítač: <span id="computerScore">0</span></p>
        </div>

        <button class="reset" onclick="resetGame()">Reset hry</button>

    </section>

    <footer>
        <p>Školní projekt – JavaScript aplikace 2026</p>
    </footer>
    <script src="script.js" type="text/javascript"></script>
</main>
</body>
</html>
